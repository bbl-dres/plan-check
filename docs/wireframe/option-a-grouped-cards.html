<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option A — Grouped Cards | Prüfregeln</title>
    <link rel="stylesheet" href="../../css/tokens.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family-primary);
            background: var(--color-bg-page);
            color: var(--color-text-primary);
            display: flex;
            justify-content: center;
            padding: var(--space-6);
        }
        .wireframe-label {
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--color-primary); color: var(--color-text-inverse);
            padding: var(--space-2) var(--space-4); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
            text-align: center; z-index: 100;
        }
        .side-panel {
            width: 380px;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 100px);
            margin-top: var(--space-6);
        }

        /* Toolbar */
        .toolbar {
            display: flex; gap: var(--space-2); padding: var(--space-3) var(--space-4); align-items: center;
            border-bottom: 1px solid var(--color-border); background: var(--color-bg-secondary);
            flex-shrink: 0;
        }
        .toolbar input[type="text"] {
            flex: 1; padding: var(--space-1) var(--space-3); border: 1px solid var(--color-border);
            font-size: var(--font-size-xs); background: var(--color-bg-primary);
            font-family: inherit;
        }
        .toolbar input[type="text"]:focus {
            border-color: var(--color-primary); outline: none; box-shadow: var(--shadow-focus);
        }
        .toolbar select {
            padding: var(--space-1) var(--space-2); border: 1px solid var(--color-border);
            font-size: var(--font-size-2xs); background: var(--color-bg-primary); cursor: pointer;
            font-family: inherit;
        }

        /* List */
        .list { flex: 1; overflow-y: auto; }

        /* Category group */
        .category {
            border-bottom: 1px solid var(--color-border);
        }
        .category__header {
            display: flex; align-items: center; gap: var(--space-2);
            padding: var(--space-3) var(--space-4); cursor: pointer;
            background: var(--color-bg-secondary);
            font-size: var(--font-size-2xs); font-weight: var(--font-weight-semibold);
            text-transform: uppercase; letter-spacing: var(--letter-spacing-caps);
            color: var(--color-text-secondary);
            user-select: none;
            transition: background var(--duration-normal);
        }
        .category__header:hover { background: var(--color-pattens-blue); }
        .category__chevron {
            width: 14px; height: 14px; transition: transform var(--duration-medium);
            color: var(--color-text-secondary);
        }
        .category.collapsed .category__chevron { transform: rotate(-90deg); }
        .category.collapsed .category__items { display: none; }
        .category__badge {
            margin-left: auto;
            font-size: var(--font-size-2xs); font-weight: var(--font-weight-bold);
            padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm);
            font-family: var(--font-family-mono);
        }
        .category__badge--pass { background: var(--color-success-light); color: var(--color-success); }
        .category__badge--fail { background: var(--color-error-light); color: var(--color-error); }
        .category__badge--warn { background: var(--color-warning-light); color: var(--color-warning); }

        /* Rule item */
        .rule {
            display: flex; align-items: flex-start; gap: var(--space-3);
            padding: var(--space-2) var(--space-4) var(--space-2) var(--space-5);
            font-size: var(--font-size-xs); cursor: pointer;
            transition: background var(--duration-fast);
            border-bottom: 1px solid var(--color-border-light);
        }
        .rule:last-child { border-bottom: none; }
        .rule:nth-child(even) { background: var(--color-zebra); }
        .rule:hover { background: var(--color-primary-light); }

        .rule__icon {
            flex-shrink: 0; width: var(--icon-size-sm); text-align: center;
            font-size: var(--font-size-xs); font-weight: var(--font-weight-bold); line-height: var(--line-height-snug);
        }
        .rule__icon--pass { color: var(--color-success); }
        .rule__icon--fail { color: var(--color-error); }
        .rule__icon--warn { color: var(--color-warning); }

        .rule__body { flex: 1; min-width: 0; }
        .rule__code {
            font-size: var(--font-size-2xs); font-family: var(--font-family-mono);
            font-weight: var(--font-weight-semibold); color: var(--color-primary);
        }
        .rule__desc {
            font-size: var(--font-size-2xs); color: var(--color-text-secondary);
            margin-top: 2px; line-height: var(--line-height-snug);
        }
        .rule__count {
            flex-shrink: 0; font-size: var(--font-size-2xs); font-family: var(--font-family-mono);
            color: var(--color-text-secondary); white-space: nowrap;
            align-self: center;
        }

        /* Summary */
        .summary {
            border-top: 1px solid var(--color-border);
            padding: var(--space-3) var(--space-4); background: var(--color-bg-secondary);
            flex-shrink: 0; font-size: var(--font-size-xs);
            display: flex; gap: var(--space-3); align-items: center;
        }
        .summary__stat {
            display: flex; align-items: center; gap: var(--space-1);
        }
        .summary__dot {
            width: 8px; height: 8px; border-radius: var(--radius-full);
        }
        .summary__dot--pass { background: var(--color-success); }
        .summary__dot--fail { background: var(--color-error); }
        .summary__dot--warn { background: var(--color-warning); }
        .summary__val {
            font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums;
            font-family: var(--font-family-mono);
        }
        .summary__label { color: var(--color-text-secondary); font-size: var(--font-size-2xs); }
        .summary__score {
            margin-left: auto; font-weight: var(--font-weight-bold);
            font-size: var(--font-size-sm); color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="wireframe-label">Option A — Grouped Cards (collapsible categories)</div>

    <div class="side-panel">
        <div class="toolbar">
            <input type="text" placeholder="Regel suchen..." id="search">
            <select id="filter">
                <option value="all">Alle</option>
                <option value="fail">Fehler</option>
                <option value="warn">Warnungen</option>
                <option value="pass">Bestanden</option>
            </select>
        </div>

        <div class="list" id="list"></div>

        <div class="summary" id="summary"></div>
    </div>

    <script>
        const RULES = [
            { cat: 'LAYER', code: 'LAYER_001', sev: 'error',   desc: 'Pflicht-Layer fehlt: R_RAUMPOLYGON' },
            { cat: 'LAYER', code: 'LAYER_002', sev: 'error',   desc: 'Pflicht-Layer fehlt: R_AOID' },
            { cat: 'LAYER', code: 'LAYER_003', sev: 'error',   desc: 'Pflicht-Layer fehlt: R_GESCHOSSPOLYGON' },
            { cat: 'LAYER', code: 'LAYER_004', sev: 'warning', desc: 'Pflicht-Layer fehlt: A_ARCHITEKTUR' },
            { cat: 'LAYER', code: 'LAYER_005', sev: 'warning', desc: 'Pflicht-Layer fehlt: V_PLANLAYOUT' },
            { cat: 'LAYER', code: 'LAYER_006', sev: 'warning', desc: 'Pflicht-Layer fehlt: V_BEMASSUNG' },
            { cat: 'LAYER', code: 'LAYER_007', sev: 'warning', desc: 'Pflicht-Layer fehlt: A_SCHRAFFUR' },
            { cat: 'LAYER', code: 'LAYER_008', sev: 'warning', desc: 'Unbekannter Layer vorhanden' },
            { cat: 'POLY',  code: 'POLY_001',  sev: 'error',   desc: 'Raumpolygon ist nicht geschlossen' },
            { cat: 'POLY',  code: 'POLY_002',  sev: 'error',   desc: 'Raumpolygon enthält Bogensegmente' },
            { cat: 'POLY',  code: 'POLY_003',  sev: 'error',   desc: 'Polygon hat weniger als 3 Eckpunkte' },
            { cat: 'POLY',  code: 'POLY_004',  sev: 'warning', desc: 'Raumfläche sehr klein (< 0.25 m²)' },
            { cat: 'POLY',  code: 'POLY_005',  sev: 'warning', desc: 'Mögliches doppeltes Polygon' },
            { cat: 'POLY',  code: 'POLY_006',  sev: 'error',   desc: 'Element auf R_RAUMPOLYGON ist keine LWPOLYLINE' },
            { cat: 'POLY',  code: 'POLY_007',  sev: 'warning', desc: 'Raumpolygon hat Selbstüberschneidung' },
            { cat: 'GPOLY', code: 'GPOLY_001', sev: 'error',   desc: 'Geschosspolygon ist nicht geschlossen' },
            { cat: 'GPOLY', code: 'GPOLY_002', sev: 'error',   desc: 'Geschosspolygon enthält Bogensegmente' },
            { cat: 'GPOLY', code: 'GPOLY_003', sev: 'error',   desc: 'Element auf R_GESCHOSSPOLYGON ist keine LWPOLYLINE' },
            { cat: 'GPOLY', code: 'GPOLY_004', sev: 'warning', desc: 'Kein Geschosspolygon vorhanden' },
            { cat: 'GPOLY', code: 'GPOLY_005', sev: 'warning', desc: 'Mögliches doppeltes Geschosspolygon' },
            { cat: 'AOID',  code: 'AOID_001',  sev: 'error',   desc: 'Raumpolygon hat keine AOID' },
            { cat: 'AOID',  code: 'AOID_002',  sev: 'error',   desc: 'AOID ist nicht eindeutig' },
            { cat: 'AOID',  code: 'AOID_003',  sev: 'warning', desc: 'AOID-Format ungültig' },
            { cat: 'AOID',  code: 'AOID_004',  sev: 'warning', desc: 'Mehrere Texte auf R_AOID im Polygon' },
            { cat: 'AOID',  code: 'AOID_005',  sev: 'warning', desc: 'AOID-Text ausserhalb aller Raumpolygone' },
            { cat: 'AOID',  code: 'AOID_006',  sev: 'warning', desc: 'AOID-Basispunkt ausserhalb Polygon' },
            { cat: 'GEOM',  code: 'GEOM_001',  sev: 'error',   desc: 'Zeichnungseinheit ist nicht Millimeter' },
            { cat: 'GEOM',  code: 'GEOM_002',  sev: 'warning', desc: 'Element hat Z-Koordinate ≠ 0' },
            { cat: 'GEOM',  code: 'GEOM_003',  sev: 'error',   desc: 'Unzulässiger Entitätstyp vorhanden' },
            { cat: 'GEOM',  code: 'GEOM_004',  sev: 'warning', desc: 'Externe Referenz (XREF) vorhanden' },
            { cat: 'GEOM',  code: 'GEOM_005',  sev: 'warning', desc: 'Element ausserhalb des Schnittrahmens' },
            { cat: 'TEXT',  code: 'TEXT_001',   sev: 'warning', desc: 'Textelement auf unzulässigem Layer' },
            { cat: 'TEXT',  code: 'TEXT_002',   sev: 'warning', desc: 'Schriftart ist nicht ARIAL' },
            { cat: 'STYLE', code: 'STYLE_001', sev: 'warning', desc: 'Polylinienbreite ist nicht 0 mm' },
            { cat: 'STYLE', code: 'STYLE_002', sev: 'warning', desc: 'Farbe ist nicht VONLAYER' },
            { cat: 'LAYOUT',code: 'LAYOUT_001',sev: 'warning', desc: 'Layout-Tab (Paper Space) vorhanden' },
            { cat: 'LAYOUT',code: 'LAYOUT_002',sev: 'warning', desc: 'Kein Planrahmen auf V_PLANLAYOUT erkannt' },
            { cat: 'DIM',   code: 'DIM_001',   sev: 'warning', desc: 'Keine Masselemente auf V_BEMASSUNG' },
            { cat: 'DIM',   code: 'DIM_002',   sev: 'warning', desc: 'Masselement ist nicht assoziativ' },
            { cat: 'HATCH', code: 'HATCH_001', sev: 'warning', desc: 'Schraffur auf A_SCHRAFFUR ist nicht SOLID' },
        ];

        const CAT_LABELS = {
            LAYER: 'Layerstruktur', POLY: 'Raumpolygone', GPOLY: 'Geschosspolygone',
            AOID: 'Raumstempel', GEOM: 'Geometrie', TEXT: 'Textelemente',
            STYLE: 'Linientypen/Farben', LAYOUT: 'Planlayout', DIM: 'Masselemente', HATCH: 'Schraffuren'
        };

        // Simulate some violations
        const VIOLATIONS = {
            'LAYER_008': 3, 'POLY_002': 2, 'POLY_004': 1, 'POLY_007': 1,
            'AOID_001': 4, 'AOID_003': 2, 'AOID_005': 1,
            'GEOM_002': 12, 'TEXT_001': 5, 'TEXT_002': 8,
            'STYLE_002': 15, 'LAYOUT_001': 1, 'DIM_001': 1, 'HATCH_001': 2
        };

        const collapsedState = {};

        function getStatus(code) {
            const count = VIOLATIONS[code] || 0;
            if (count === 0) return 'pass';
            const rule = RULES.find(r => r.code === code);
            return rule?.sev === 'error' ? 'fail' : 'warn';
        }

        function renderList() {
            const search = document.getElementById('search').value.toLowerCase();
            const filter = document.getElementById('filter').value;
            const list = document.getElementById('list');

            const filtered = RULES.filter(r => {
                const status = getStatus(r.code);
                if (filter === 'fail' && status !== 'fail') return false;
                if (filter === 'warn' && status !== 'warn') return false;
                if (filter === 'pass' && status !== 'pass') return false;
                if (search && !r.code.toLowerCase().includes(search) && !r.desc.toLowerCase().includes(search)) return false;
                return true;
            });

            const cats = [...new Set(filtered.map(r => r.cat))];
            let html = '';

            for (const cat of cats) {
                const catRules = filtered.filter(r => r.cat === cat);
                const failCount = catRules.filter(r => getStatus(r.code) === 'fail').length;
                const warnCount = catRules.filter(r => getStatus(r.code) === 'warn').length;
                const passCount = catRules.filter(r => getStatus(r.code) === 'pass').length;
                const collapsed = collapsedState[cat] ? 'collapsed' : '';

                let badgeClass = 'pass';
                let badgeText = `${passCount}/${catRules.length}`;
                if (failCount > 0) { badgeClass = 'fail'; badgeText = `${failCount} Fehler`; }
                else if (warnCount > 0) { badgeClass = 'warn'; badgeText = `${warnCount} Warnung`; }

                html += `<div class="category ${collapsed}" data-cat="${cat}">
                    <div class="category__header" onclick="toggleCat('${cat}')">
                        <svg class="category__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        ${CAT_LABELS[cat]} (${catRules.length})
                        <span class="category__badge category__badge--${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="category__items">`;

                for (const r of catRules) {
                    const status = getStatus(r.code);
                    const count = VIOLATIONS[r.code] || 0;
                    const icon = status === 'pass' ? '\u2713' : status === 'fail' ? '\u2716' : '\u26A0';
                    html += `<div class="rule">
                        <span class="rule__icon rule__icon--${status}">${icon}</span>
                        <div class="rule__body">
                            <div class="rule__code">${r.code}</div>
                            <div class="rule__desc">${r.desc}</div>
                        </div>
                        <span class="rule__count">${count > 0 ? count + 'x' : ''}</span>
                    </div>`;
                }

                html += `</div></div>`;
            }

            list.innerHTML = html;
            renderSummary();
        }

        function renderSummary() {
            const pass = RULES.filter(r => getStatus(r.code) === 'pass').length;
            const fail = RULES.filter(r => getStatus(r.code) === 'fail').length;
            const warn = RULES.filter(r => getStatus(r.code) === 'warn').length;
            const score = Math.round(pass / RULES.length * 100);

            document.getElementById('summary').innerHTML = `
                <span class="summary__stat"><span class="summary__dot summary__dot--pass"></span><span class="summary__val">${pass}</span><span class="summary__label">OK</span></span>
                <span class="summary__stat"><span class="summary__dot summary__dot--fail"></span><span class="summary__val">${fail}</span><span class="summary__label">Fehler</span></span>
                <span class="summary__stat"><span class="summary__dot summary__dot--warn"></span><span class="summary__val">${warn}</span><span class="summary__label">Warn.</span></span>
                <span class="summary__score">${score}%</span>
            `;
        }

        function toggleCat(cat) {
            collapsedState[cat] = !collapsedState[cat];
            renderList();
        }

        document.getElementById('search').addEventListener('input', renderList);
        document.getElementById('filter').addEventListener('change', renderList);
        renderList();
    </script>
</body>
</html>
