<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBL Prüfplattform - Unit Tests</title>
    <link rel="stylesheet" href="../css/tokens.css">
    <style>
        body {
            font-family: var(--font-family-primary);
            max-width: 800px;
            margin: var(--space-7) auto;
            padding: var(--space-5);
            background: var(--color-smoke);
        }
        h1 {
            color: var(--color-text-primary);
            border-bottom: 3px solid var(--color-swiss-red);
            padding-bottom: var(--space-3);
        }
        #test-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: var(--space-5);
            border-radius: var(--radius-lg);
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        .pass { color: #4ec9b0; }
        .fail { color: #f14c4c; }
        .header { color: #569cd6; font-weight: bold; }
        #summary {
            margin-top: var(--space-5);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            font-weight: bold;
        }
        #summary.success {
            background: var(--color-success-light);
            color: var(--color-success);
            border: 1px solid var(--color-success-border);
        }
        #summary.failure {
            background: var(--color-error-light);
            color: var(--color-error);
            border: 1px solid var(--color-error-border);
        }
        button {
            background: var(--color-primary);
            color: var(--color-text-inverse);
            border: none;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--font-size-base);
            margin-bottom: var(--space-5);
        }
        button:hover {
            background: var(--color-primary-hover);
        }
        button:focus-visible {
            outline: 3px solid var(--color-focus);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <h1>BBL Prüfplattform - Unit Tests</h1>
    <button onclick="runTests()">Run Tests</button>
    <div id="test-output"></div>
    <div id="summary"></div>

    <!-- Load main script first (contains functions to test) -->
    <script src="js/script.js"></script>
    <!-- Load test script -->
    <script src="js/script.test.js"></script>
    <script>
        const output = document.getElementById('test-output');
        const summaryEl = document.getElementById('summary');

        // Override console.log to display in page
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            originalLog.apply(console, args);
            const text = args.join(' ');
            const span = document.createElement('span');
            if (text.includes('===')) {
                span.className = 'header';
            } else if (text.includes('✓')) {
                span.className = 'pass';
            } else if (text.includes('Passed:')) {
                span.className = 'pass';
            }
            span.textContent = text + '\n';
            output.appendChild(span);
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            const text = args.join(' ');
            const span = document.createElement('span');
            span.className = 'fail';
            span.textContent = text + '\n';
            output.appendChild(span);
        };

        function runTests() {
            output.innerHTML = '';
            summaryEl.innerHTML = '';
            summaryEl.className = '';

            // Reset test runner
            TestRunner.passed = 0;
            TestRunner.failed = 0;
            TestRunner.results = [];

            const success = runAllTests();

            summaryEl.className = success ? 'success' : 'failure';
            summaryEl.textContent = success
                ? `✓ All ${TestRunner.passed} tests passed!`
                : `✗ ${TestRunner.failed} of ${TestRunner.passed + TestRunner.failed} tests failed`;
        }

        // Auto-run on load
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
